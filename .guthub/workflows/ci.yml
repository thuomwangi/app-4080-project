name: CI - Lint, Typecheck, Test, Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install frontend dependencies
        run: npm ci

      - name: 🔍 Lint frontend
        run: npm run lint               # ← change if your lint script is different

      - name: 🛡️ Type check frontend
        run: npm run typecheck          # or: npx tsc --noEmit

      - name: 🧪 Test frontend
        run: npm test                   # vitest, jest, etc.

      - name: 🏗️ Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install backend dependencies
        run: npm ci

      - name: 🔍 Lint backend (if you have lint)
        run: npm run lint             # optional – skip or remove if no lint script

      - name: 🛡️ Type check backend (if using TS)
        run: npx tsc --noEmit         # optional – remove if pure JS

      - name: 🧪 Test backend
        run: npm test                 # optional – remove if no tests yet