name: Node.js CI

on:
  push:
    branches: [ "main", "ray-home-sellerdash" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm run build # This catches 90% of "it won't reflect" issues (syntax errors)